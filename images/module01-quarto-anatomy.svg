<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Anatomy of a Quarto document</title>
  <desc id="desc">A schematic Quarto document with YAML, Markdown, an R code chunk, and rendered output.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #263238; stroke-width: 3; }
      .bar { fill: #263238; }
      .yaml { fill: #d6f0ef; stroke: #0f766e; }
      .md { fill: #fff1c2; stroke: #b45309; }
      .chunk { fill: #f3e8ff; stroke: #7e22ce; }
      .output { fill: #dcfce7; stroke: #15803d; }
      .label { font: 700 28px Arial, sans-serif; fill: #111827; }
      .text { font: 23px Arial, sans-serif; fill: #111827; }
      .mono { font: 22px Consolas, "Courier New", monospace; fill: #111827; }
      .small { font: 18px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="620" rx="24"/>
  <rect class="panel" x="55" y="55" width="990" height="510" rx="18"/>
  <rect class="bar" x="55" y="55" width="990" height="54" rx="18"/>
  <circle cx="92" cy="82" r="10" fill="#ef4444"/>
  <circle cx="124" cy="82" r="10" fill="#f59e0b"/>
  <circle cx="156" cy="82" r="10" fill="#22c55e"/>
  <text class="label" x="205" y="92">report.qmd</text>

  <rect class="yaml" x="95" y="145" width="430" height="105" rx="14"/>
  <text class="label" x="120" y="182">YAML header</text>
  <text class="mono" x="120" y="216">title: "My report"</text>
  <text class="mono" x="120" y="244">format: html</text>

  <rect class="md" x="95" y="280" width="430" height="105" rx="14"/>
  <text class="label" x="120" y="317">Markdown text</text>
  <text class="mono" x="120" y="351">## Results</text>
  <text class="mono" x="120" y="379">This paragraph explains...</text>

  <rect class="chunk" x="95" y="415" width="430" height="105" rx="14"/>
  <text class="label" x="120" y="452">Code chunk</text>
  <text class="mono" x="120" y="486">```{r age-plot}</text>
  <text class="mono" x="120" y="514">ggplot(qcrc, aes(age))</text>

  <rect class="output" x="615" y="165" width="355" height="335" rx="18"/>
  <text class="label" x="650" y="207">Rendered output</text>
  <rect x="650" y="240" width="285" height="44" rx="8" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
  <text class="text" x="670" y="270">My report</text>
  <rect x="650" y="310" width="285" height="16" rx="8" fill="#86efac"/>
  <rect x="650" y="340" width="245" height="16" rx="8" fill="#bbf7d0"/>
  <rect x="650" y="385" width="90" height="70" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
  <rect x="770" y="365" width="165" height="90" fill="#c7d2fe" stroke="#4338ca" stroke-width="2"/>
  <polyline points="790,435 825,402 860,420 900,382" fill="none" stroke="#4338ca" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <text class="small" x="600" y="535">Quarto combines prose, code, results, and settings into one reproducible file.</text>
</svg>
