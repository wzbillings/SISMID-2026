<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Quarto render workflow</title>
  <desc id="desc">A Quarto document flows through the render button or command line into HTML, Word, PDF, or slides.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #1f2937; stroke-width: 3; }
      .source { fill: #e0f2fe; stroke: #0369a1; }
      .engine { fill: #fef3c7; stroke: #b45309; }
      .out1 { fill: #dcfce7; stroke: #15803d; }
      .out2 { fill: #fae8ff; stroke: #a21caf; }
      .out3 { fill: #ede9fe; stroke: #6d28d9; }
      .out4 { fill: #fee2e2; stroke: #b91c1c; }
      .label { font: 700 30px Arial, sans-serif; fill: #111827; }
      .text { font: 22px Arial, sans-serif; fill: #111827; }
      .small { font: 18px Arial, sans-serif; fill: #374151; }
      .mono { font: 21px Consolas, "Courier New", monospace; fill: #111827; }
      .arrow { stroke: #334155; stroke-width: 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="620" rx="24"/>

  <rect class="card source" x="80" y="210" width="230" height="170" rx="18"/>
  <text class="label" x="125" y="258">.qmd</text>
  <text class="text" x="125" y="300">Prose</text>
  <text class="text" x="125" y="333">Code</text>
  <text class="text" x="125" y="366">Settings</text>

  <path class="arrow" d="M330 295 H440"/>

  <rect class="card engine" x="460" y="190" width="230" height="210" rx="18"/>
  <text class="label" x="510" y="242">Render</text>
  <text class="text" x="505" y="287">Run code</text>
  <text class="text" x="505" y="322">Collect results</text>
  <text class="text" x="505" y="357">Build document</text>
  <text class="mono" x="505" y="389">quarto render</text>

  <path class="arrow" d="M710 295 H810"/>

  <rect class="card out1" x="840" y="80" width="190" height="85" rx="16"/>
  <text class="label" x="890" y="132">HTML</text>
  <rect class="card out2" x="840" y="205" width="190" height="85" rx="16"/>
  <text class="label" x="892" y="257">Word</text>
  <rect class="card out3" x="840" y="330" width="190" height="85" rx="16"/>
  <text class="label" x="904" y="382">PDF</text>
  <rect class="card out4" x="840" y="455" width="190" height="85" rx="16"/>
  <text class="label" x="889" y="507">Slides</text>

  <path class="arrow" d="M690 250 C760 145 785 123 820 123"/>
  <path class="arrow" d="M690 280 C755 247 785 247 820 247"/>
  <path class="arrow" d="M690 315 C755 370 785 372 820 372"/>
  <path class="arrow" d="M690 350 C760 475 785 498 820 498"/>

  <text class="small" x="100" y="540">Same source, different output formats. Change the YAML format field when your audience changes.</text>
</svg>
